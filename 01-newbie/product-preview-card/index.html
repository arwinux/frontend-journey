<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>
    <link rel="stylesheet" href="./src/css/main.css" />
  </head>

  <body>
    <main>
      <article class="product-card">
        <div class="product-card__image"></div>

        <div class="product-card__content">
          <div class="product-card__type">PERFUME</div>
          <h1 class="product-card__title">Gabrielle Essence Eau De Parfum</h1>
          <p class="product-card__desc">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
          <div class="product-card__price">
            <p class="product-card__price-discount">$149.99</p>
            <p class="product-card__price-real">$169.99</p>
          </div>

          <button class="product-card__add-btn">
            <img src="./assets/images/icon-cart.svg" alt="" />
            <span>Add to Cart</span>
          </button>
        </div>
      </article>
    </main>
  </body>
</html>
